<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!--
    3D Thread Customizer — Exclusive Logo
    Dark badge · Gold gradients · Bold fills
    Transparent outer background
  -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1C1C1C"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5D07A"/>
      <stop offset="50%" stop-color="#C9942A"/>
      <stop offset="100%" stop-color="#A07010"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE090"/>
      <stop offset="100%" stop-color="#B8800A"/>
    </linearGradient>
    <linearGradient id="spool-body" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5E10"/>
      <stop offset="30%" stop-color="#C9942A"/>
      <stop offset="60%" stop-color="#F5D07A"/>
      <stop offset="100%" stop-color="#9A6A18"/>
    </linearGradient>
    <linearGradient id="spool-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5D07A"/>
      <stop offset="100%" stop-color="#A07010"/>
    </linearGradient>
  </defs>

  <!-- Dark badge circle -->
  <circle cx="250" cy="232" r="178" fill="url(#bg)"/>
  <circle cx="250" cy="232" r="178" fill="none" stroke="url(#gold)" stroke-width="5"/>
  <circle cx="250" cy="232" r="168" fill="none" stroke="#C9942A" stroke-width="1.2" opacity="0.7"/>
  <circle cx="250" cy="232" r="155" fill="none" stroke="#C9942A" stroke-width="0.8" opacity="0.4"/>

  <!-- 12 tick marks -->
  <g stroke="url(#gold)" stroke-width="4" stroke-linecap="round">
    <line x1="250" y1="54" x2="250" y2="66" transform="rotate(0,250,232)"/>
    <line x1="250" y1="54" x2="250" y2="66" transform="rotate(30,250,232)"/>
    <line x1="250" y1="54" x2="250" y2="66" transform="rotate(60,250,232)"/>
    <line x1="250" y1="54" x2="250" y2="66" transform="rotate(90,250,232)"/>
    <line x1="250" y1="54" x2="250" y2="66" transform="rotate(120,250,232)"/>
    <line x1="250" y1="54" x2="250" y2="66" transform="rotate(150,250,232)"/>
    <line x1="250" y1="54" x2="250" y2="66" transform="rotate(180,250,232)"/>
    <line x1="250" y1="54" x2="250" y2="66" transform="rotate(210,250,232)"/>
    <line x1="250" y1="54" x2="250" y2="66" transform="rotate(240,250,232)"/>
    <line x1="250" y1="54" x2="250" y2="66" transform="rotate(270,250,232)"/>
    <line x1="250" y1="54" x2="250" y2="66" transform="rotate(300,250,232)"/>
    <line x1="250" y1="54" x2="250" y2="66" transform="rotate(330,250,232)"/>
  </g>

  <!-- Spool: bottom flange -->
  <ellipse cx="250" cy="298" rx="95" ry="20" fill="url(#spool-body)"/>
  <path d="M155,298 A95,20 0 0,0 345,298 L345,312 A95,20 0 0,1 155,312 Z" fill="#6B4508"/>
  <ellipse cx="250" cy="312" rx="95" ry="20" fill="url(#spool-top)" opacity="0.6"/>

  <!-- Spool: cylinder body -->
  <rect x="177" y="170" width="146" height="130" fill="url(#spool-body)"/>
  <rect x="177" y="170" width="20" height="130" fill="#7A5010" opacity="0.7"/>
  <rect x="303" y="170" width="20" height="130" fill="#7A5010" opacity="0.7"/>
  <rect x="235" y="170" width="28" height="130" fill="#F5D07A" opacity="0.18"/>

  <!-- Thread wrap lines -->
  <g stroke="#0A0A0A" stroke-width="3" opacity="0.55">
    <line x1="177" y1="188" x2="323" y2="188"/>
    <line x1="177" y1="208" x2="323" y2="208"/>
    <line x1="177" y1="228" x2="323" y2="228"/>
    <line x1="177" y1="248" x2="323" y2="248"/>
    <line x1="177" y1="268" x2="323" y2="268"/>
    <line x1="177" y1="288" x2="323" y2="288"/>
  </g>
  <g stroke="#F5D07A" stroke-width="0.6" opacity="0.25">
    <line x1="177" y1="198" x2="323" y2="198"/>
    <line x1="177" y1="218" x2="323" y2="218"/>
    <line x1="177" y1="238" x2="323" y2="238"/>
    <line x1="177" y1="258" x2="323" y2="258"/>
    <line x1="177" y1="278" x2="323" y2="278"/>
  </g>

  <!-- Spool: top flange -->
  <ellipse cx="250" cy="170" rx="95" ry="20" fill="url(#spool-top)"/>
  <ellipse cx="250" cy="170" rx="72" ry="14" fill="none" stroke="#8B5E10" stroke-width="3"/>
  <ellipse cx="250" cy="170" rx="22" ry="7" fill="#0A0A0A"/>
  <ellipse cx="250" cy="298" rx="22" ry="7" fill="#0A0A0A"/>

  <!-- Needle -->
  <g transform="translate(316,122) rotate(-35)">
    <path d="M-7,0 L-7,58 Q0,70 7,58 L7,0 Q0,-10 -7,0 Z" fill="url(#gold2)"/>
    <ellipse cx="0" cy="12" rx="4.5" ry="3" fill="#0A0A0A"/>
    <path d="M-7,0 L-7,58 Q0,70 7,58 L7,0 Q0,-10 -7,0 Z" fill="none" stroke="#F5D07A" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- Thread from needle to spool -->
  <path d="M307,154 C295,162 278,168 265,170"
        fill="none" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Star ornaments -->
  <g transform="translate(178,232)" fill="url(#gold)">
    <polygon points="0,-9 2,-3 8,-3 3,1 5,7 0,3 -5,7 -3,1 -8,-3 -2,-3"/>
  </g>
  <g transform="translate(322,232)" fill="url(#gold)">
    <polygon points="0,-9 2,-3 8,-3 3,1 5,7 0,3 -5,7 -3,1 -8,-3 -2,-3"/>
  </g>

  <!-- Banner ribbon -->
  <path d="M72,385 L88,370 L412,370 L428,385 L412,400 L88,400 Z" fill="url(#gold)"/>
  <path d="M72,385 L62,395 L80,408 L88,400 Z" fill="#8B5E10"/>
  <path d="M428,385 L438,395 L420,408 L412,400 Z" fill="#8B5E10"/>

  <text x="250" y="389"
        text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="18" font-weight="700"
        fill="#0A0A0A" letter-spacing="6">3D THREAD CUSTOMIZER</text>

  <!-- Tagline -->
  <text x="250" y="430"
        text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="10" fill="#C9942A" letter-spacing="5">WEAR YOUR IMAGINATION</text>
  <line x1="105" y1="427" x2="165" y2="427" stroke="#C9942A" stroke-width="0.8" opacity="0.6"/>
  <line x1="335" y1="427" x2="395" y2="427" stroke="#C9942A" stroke-width="0.8" opacity="0.6"/>
</svg>
